<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password — RESOLVIT</title>
    <link rel="stylesheet" href="css/styles.css" />
   type="image/png" href="https://raw.githubusercontent.com/LIKITH-3012-MAC/PORTFOLIO-LIKITH/main/resolvit.png">
  
  <!-- Auth0 Runtime Configuration -->
  <script>
    window.AUTH0_CONFIG = {
      domain: "resolvit-ai.us.auth0.com",
      clientId: "wBl9vRriwj4qiDMAQeyPzDAxFF5O3tvI",
      redirectUri: "https://resolvit-app-2026.vercel.app"
    };
  </script>
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/LIKITH-3012-MAC/PORTFOLIO-LIKITH/main/resolvit.png">
  <link rel="shortcut icon" href="https://raw.githubusercontent.com/LIKITH-3012-MAC/PORTFOLIO-LIKITH/main/resolvit.png">
</head>

<body>

    <div class="auth-page">
        <div class="auth-card glass glow-accent">
            <div class="auth-logo">
                <div class="nav-logo-icon">⚖️</div>
                <h1 style="font-size: 1.5rem; margin-top: 10px;">RESOLVIT</h1>
            </div>

            <h2 class="auth-title">Forgot Password?</h2>
            <p class="auth-subtitle">Enter your email address and we'll send you a link to reset your password.</p>

            <div id="alert-container"></div>

            <form id="forgot-form" class="flex flex-col gap-4">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="you@example.com" required
                        autocomplete="email" />
                </div>

                <button type="submit" class="btn btn-primary btn-lg" id="submit-btn" style="width:100%;">
                    Send Reset Link
                </button>
            </form>

            <div class="auth-footer" style="margin-top: 24px; text-align: center;">
                <p style="font-size: 0.9rem; color: var(--text-muted);">
                    Remember your password? <a href="index.html" style="color: var(--accent); font-weight: 600;">Sign
                        in</a>
                </p>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>
    <script src="js/api.js"></script>
      <script src="js/auth.js"></script>
  <script src="https://cdn.auth0.com/js/auth0-spa-js/2.1/auth0-spa-js.production.js"></script>
  <script src="js/auth0-integration.js"></script>
  
  
  
  
  
  
  
    <script src="js/theme-manager.js"></script>
      
  
  
    <script src="js/animations.js"></script>

    <script>
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const btn = document.getElementById('submit-btn');

            btn.disabled = true;
            btn.textContent = '⏳ Sending...';

            try {
                const data = await API.post('/api/auth/forgot-password', { email });
                document.getElementById('alert-container').innerHTML = `<div class="alert alert-success">✅ ${data.message}</div>`;
                document.getElementById('forgot-form').reset();
            } catch (err) {
                document.getElementById('alert-container').innerHTML = `<div class="alert alert-error">❌ ${err.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send Reset Link';
            }
        });
    </script>

    <!-- Smooth Scroll & Hardware Acceleration Engine -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <script src="js/smooth-scroll.js"></script>
</body>

</html>
