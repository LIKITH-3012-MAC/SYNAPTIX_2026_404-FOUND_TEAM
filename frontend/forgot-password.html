<html lang="en">

<head>
    <meta charset="UTF-8" />
    <!-- Primary Meta Tags -->
    <title>Forgot Password | RESOLVIT - AI Civic Governance Platform</title>
    <meta name="title" content="Forgot Password | RESOLVIT - AI Civic Governance Platform">

        content="AI-powered civic issue resolution platform connecting citizens, authorities, and admin in real-time. Securely recover your account.">

    <meta name="robots" content="index, follow">

    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="RESOLVIT - AI Civic Governance Platform">
    <meta property="og:description" content="AI-powered civic issue resolution platform connecting citizens, authorities, and admin in real-time.">
    <meta property="og:url" content="https://resolvit-ai.online/forgot-password">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://resolvit-ai.online/resolvit.png">

    <!-- JSON-LD Structured Data for AI -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebPage",
          "name": "RESOLVIT Recovery Portal",
          "url": "https://resolvit-ai.online/forgot-password",
          "description": "Password recovery page for the RESOLVIT platform."
        },
        {
          "@type": "WebSite",
          "name": "RESOLVIT",
          "url": "https://resolvit-ai.online"
        }
      ]
    }
    </script>

    <link rel="stylesheet" href="css/styles.css" />
    <!-- RESOLVIT Official Favicon -->
    <link rel="icon" type="image/png" href="https://resolvit-ai.online/resolvit.png">
    <link rel="shortcut icon" href="https://resolvit-ai.online/resolvit.png">

    <script>
        window.AUTH0_CONFIG = {
            domain: "resolvit-ai.us.auth0.com",
            clientId: "wBl9vRriwj4qiDMAQeyPzDAxFF5O3tvI",
            redirectUri: "https://resolvit-ai.online"
        };
    </script>

</head>

<body>

    <div class="auth-page">
        <div class="auth-card glass glow-accent">
            <div class="auth-logo">
                <div class="nav-logo-icon">⚖️</div>
                <h1 style="font-size: 1.5rem; margin-top: 10px;">RESOLVIT</h1>
            </div>

            <h2 class="auth-title">Forgot Password?</h2>
            <p class="auth-subtitle">Enter your email address and we'll send you a link to reset your password.</p>

            <div id="alert-container"></div>

            <form id="forgot-form" class="flex flex-col gap-4">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="you@example.com" required
                        autocomplete="email" />
                </div>

                <button type="submit" class="btn btn-primary btn-lg" id="submit-btn" style="width:100%;">
                    Send Reset Link
                </button>
            </form>

            <div class="auth-footer" style="margin-top: 24px; text-align: center;">
                <p style="font-size: 0.9rem; color: var(--text-muted);">
                    Remember your password? <a href="index.html" style="color: var(--accent); font-weight: 600;">Sign
                        in</a>
                </p>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>  <!-- Core scripts: ORDER IS CRITICAL -->
  <!-- 1. API first — defines BASE_URL, showToast, API -->
  <script src="js/api.js"></script>
  <!-- 2. Auth0 SDK -->
  <script src="js/libs/auth0-spa-js.production.min.js"></script>
  <!-- 3. Auth0 integration (needs BASE_URL) -->
  <script src="js/auth0-integration.js"></script>
  <!-- 4. Auth module (needs API + Auth0Integration) -->
  <script src="js/auth.js"></script>
      
  
  
  
  
  
  
  
  
  
    <script src="js/theme-manager.js"></script>
      
  
  
    <script src="js/animations.js"></script>

    <script>
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const btn = document.getElementById('submit-btn');

            btn.disabled = true;
            btn.textContent = '⏳ Sending...';

            try {
                const data = await API.post('/api/auth/forgot-password', { email });
                document.getElementById('alert-container').innerHTML = `<div class="alert alert-success">✅ ${data.message}</div>`;
                document.getElementById('forgot-form').reset();
            } catch (err) {
                document.getElementById('alert-container').innerHTML = `<div class="alert alert-error">❌ ${err.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send Reset Link';
            }
        });
    </script>

    <!-- Smooth Scroll & Hardware Acceleration Engine -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <script src="js/smooth-scroll.js"></script>
</body>

</html>
