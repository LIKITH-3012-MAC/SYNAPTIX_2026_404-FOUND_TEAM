<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Issue Dashboard | RESOLVIT - AI Civic Governance Platform</title>
    <meta name="title" content="Issue Dashboard | RESOLVIT - AI Civic Governance Platform">
    <meta name="description"
        content="AI-powered civic issue resolution platform connecting citizens, authorities, and admin in real-time. Track issues on the live dashboard.">
    <link rel="canonical" href="https://resolvit-ai.online/dashboard">
    <meta name="robots" content="index, follow">

    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="RESOLVIT - AI Civic Governance Platform">
    <meta property="og:description" content="AI-powered civic issue resolution platform connecting citizens, authorities, and admin in real-time.">
    <meta property="og:url" content="https://resolvit-ai.online/dashboard">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/logo.svg">

    <!-- JSON-LD Structured Data for AI -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebPage",
          "name": "RESOLVIT Issue Dashboard",
          "url": "https://resolvit-ai.online/dashboard",
          "description": "Public issue tracking dashboard for the RESOLVIT platform."
        },
        {
          "@type": "WebSite",
          "name": "RESOLVIT",
          "url": "https://resolvit-ai.online"
        }
      ]
    }
    </script>

    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/map-premium.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />

  <script>
    window.AUTH0_CONFIG = {
      domain: "resolvit-ai.us.auth0.com",
      clientId: "wBl9vRriwj4qiDMAQeyPzDAxFF5O3tvI",
      redirectUri: "https://www.resolvit-ai.online"
    };
  </script>

  <style>
    .page-header { padding-top: 100px; }
  </style>

    <!-- Apple devices -->

    <!-- Theme color -->
    <meta name="theme-color" content="#0f172a">

    <!-- Favicon Branding -->
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/LIKITH-3012-MAC/PORTFOLIO-LIKITH/main/resolvit.png">
    <link rel="shortcut icon" href="https://raw.githubusercontent.com/LIKITH-3012-MAC/PORTFOLIO-LIKITH/main/resolvit.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/LIKITH-3012-MAC/PORTFOLIO-LIKITH/main/resolvit.png">

</head>

<body>

    <nav class="navbar" id="navbar">
        <div class="navbar-inner">
            <a href="index.html" class="nav-logo">
                <img src="/logo.svg" alt="RESOLVIT Logo" class="nav-logo-img">RESOLVIT
            </a>
            <div class="nav-links">
                <a href="dashboard.html" class="nav-link active" data-i18n="nav_issues">Issues</a>
                <a href="submit.html" class="nav-link" data-i18n="nav_report">Report</a>
                <a href="authority.html" class="nav-link" data-i18n="nav_authorities">Authorities</a>
            </div>
            <div class="nav-actions" id="nav-actions">
                <!-- Unified Navbar -->
            </div>
        </div>
    </nav>

    <div class="page-header">
        <div class="container">
            <div class="flex justify-between items-center glass-premium gpu-accelerate" style="padding: 30px; flex-wrap:wrap; gap:16px;">
                <div>
                    <div class="section-label" data-i18n="dash_hint">Public Feed</div>
                    <h1 style="font-size:2rem;margin-top:8px;" data-i18n="dash_title">Issue Dashboard</h1>
                </div>
                <div class="flex items-center gap-4">
                    <div class="live-indicator">
                        <div class="live-dot"></div> <span data-i18n="dash_live">LIVE — refreshes every 15s</span>
                    </div>
                    <button class="btn btn-outline btn-sm" onclick="fetchIssues()" data-i18n="dash_refresh">↻ Refresh Now</button>
                </div>
            </div>

            <!-- Stats Row -->
            <div class="metrics-grid" style="margin-top:24px;" id="summary-stats">
                <div class="metric-card glass-card-premium skeleton" style="height:100px;"></div>
                <div class="metric-card glass-card-premium skeleton" style="height:100px;"></div>
                <div class="metric-card glass-card-premium skeleton" style="height:100px;"></div>
                <div class="metric-card glass-card-premium skeleton" style="height:100px;"></div>
            </div>
        </div>
    </div>

    <section style="padding: 40px 0;">
        <div class="container dashboard-grid">
            <div class="main-dashboard-column">
                <!-- Filter / Sort Bar -->
                <div class="filter-bar glass-premium" style="padding: 20px; margin-bottom: 24px;">
                    <input type="text" id="search-input" class="search-input" data-i18n="dash_search" placeholder="🔍 Search issues..."
                        oninput="filterIssues()" />
                    <div style="display:flex;gap:8px;flex-wrap:wrap;" id="cat-filters">
                        <button class="filter-btn active" data-cat="" onclick="setCatFilter('')" data-i18n="dash_filter_all">All</button>
                        <button class="filter-btn" data-cat="Roads" onclick="setCatFilter('Roads')" data-i18n="dash_filter_roads">🛣 Roads</button>
                        <button class="filter-btn" data-cat="Water" onclick="setCatFilter('Water')" data-i18n="dash_filter_water">💧 Water</button>
                        <button class="filter-btn" data-cat="Electricity" onclick="setCatFilter('Electricity')" data-i18n="dash_filter_electric">⚡
                            Electric</button>
                        <button class="filter-btn" data-cat="Sanitation" onclick="setCatFilter('Sanitation')" data-i18n="dash_filter_sanitation">🗑
                            Sanitation</button>
                        <button class="filter-btn" data-cat="Safety" onclick="setCatFilter('Safety')" data-i18n="dash_filter_safety">🚨 Safety</button>
                    </div>
                </div>

                <!-- Status Filter Chips -->
                <div style="display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;" id="status-filters">
                    <span
                        style="font-size:0.8rem;color:var(--text-muted);display:flex;align-items:center;margin-right:4px;">Status:</span>
                    <button class="filter-btn active" data-status="" onclick="setStatusFilter('')" data-i18n="dash_status_all">All</button>
                    <button class="filter-btn" data-status="reported"
                        onclick="setStatusFilter('reported')" data-i18n="dash_status_reported">Reported</button>
                    <button class="filter-btn" data-status="in_progress" onclick="setStatusFilter('in_progress')" data-i18n="dash_status_progress">In
                        Progress</button>
                    <button class="filter-btn" data-status="escalated" onclick="setStatusFilter('escalated')" data-i18n="dash_status_escalated">🔴
                        Escalated</button>
                    <button class="filter-btn" data-status="resolved" onclick="setStatusFilter('resolved')" data-i18n="dash_status_resolved">✅
                        Resolved</button>
                </div>

                <!-- Map Toggle -->
                <div style="margin-bottom:24px;">
                    <button class="btn btn-outline btn-sm" onclick="toggleMap()" id="map-toggle-btn">🗺 Show Map
                        View</button>
                </div>
                <div id="dashboard-map"
                    style="height:380px;border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border);margin-bottom:24px;display:none;">
                </div>

                <!-- Issue Grid -->
                <div class="grid-3" id="issues-grid">
                    <div class="skeleton glass-card-premium animate-in" style="height:180px;"></div>
                    <div class="skeleton glass-card-premium animate-in" style="height:180px;"></div>
                    <div class="skeleton glass-card-premium animate-in" style="height:180px;"></div>
                </div>

                <div id="load-more" style="text-align:center;margin-top:32px;display:none;">
                    <button class="btn btn-outline btn-lg" onclick="loadMore()">Load More Issues</button>
                </div>
            </div>

            <!-- Gamified Sidebar -->
            <aside class="dashboard-sidebar">
                <div class="glass-card-premium card"
                    style="margin-bottom:24px; border:1px solid var(--accent); position:relative; overflow:hidden; padding: 24px;">
                    <div style="font-size:0.7rem; color:var(--accent); font-weight:800; margin-bottom:12px;">CIVIC
                        CREDIT STATUS</div>
                    <div class="flex items-center gap-4" id="user-gamify-info">
                        <div style="font-size:2.5rem;">🆕</div>
                        <div>
                            <div style="font-size:1.5rem; font-weight:900;" id="user-points">0</div>
                            <div class="text-secondary" style="font-size:0.75rem;">Total Credits</div>
                        </div>
                    </div>
                    <div class="progress-arc" style="margin-top:20px;">
                        <div class="progress-fill" id="user-progress" style="width: 5%;"></div>
                    </div>
                    <p style="font-size:0.65rem; color:var(--text-muted); margin-top:8px;">85 pts to "Active Citizen"
                        rank</p>
                </div>

                <div class="glass-premium card" style="padding: 24px;">
                    <h3 style="margin-bottom:20px; display:flex; align-items:center; gap:8px;">🏆 Leaderboard</h3>
                    <div id="leaderboard-list" class="flex flex-col gap-4">
                        <!-- Populated by JS -->
                        <div class="skeleton" style="height:40px; opacity: 0.1;"></div>
                        <div class="skeleton" style="height:40px; opacity: 0.1;"></div>
                    </div>
                    <button class="btn btn-ghost btn-sm" style="width:100%; margin-top:16px;">View All Citizens</button>
                </div>
            </aside>
        </div>
    </section>

    <div class="toast-container" id="toast-container"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/libs/auth0-spa-js.production.min.js"></script>
  <script src="js/auth0-integration.js"></script>

    <script src="js/theme-manager.js"></script>
    <script src="js/i18n.js"></script>

    <script src="js/gamification.js"></script>
    <script src="js/issues.js"></script>
    <script src="js/detail-manager.js"></script>
    <script src="js/simulation.js"></script>
    <script src="js/map-manager.js"></script>
    <script src="js/map_intelligence.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/ui-enhancements.js"></script>

    <script>
        window.addEventListener('scroll', () => document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50));
        document.addEventListener('DOMContentLoaded', async () => {
             // 1. Init Dashboard (uses user role for filters)
             initDashboard();
             updateNavAuth();
             
             // 2. Init Hub
             if (window.ResolutionHub) ResolutionHub.init();
             
             // 3. Demo Panel
             if (typeof initDemoPanel === "function") initDemoPanel();
        });
        function updateNavAuth() {
            if (typeof Auth.updateNavbar === 'function') Auth.updateNavbar();
        }
    </script>

    <!-- Smooth Scroll & Hardware Acceleration Engine -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <script src="js/smooth-scroll.js"></script>
</body>

</html>
