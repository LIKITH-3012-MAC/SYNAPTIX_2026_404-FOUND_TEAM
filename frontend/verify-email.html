<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - RESOLVIT</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 40%);
        }

        .verify-card {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; scale: 0.95; } to { opacity: 1; scale: 1; } }

        .icon-box {
            width: 80px;
            height: 80px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
            color: var(--primary);
            font-size: 32px;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        h1 { font-size: 28px; font-weight: 800; margin-bottom: 12px; }
        
        .email-display {
            color: var(--text-dim);
            font-size: 15px;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .email-display strong { color: var(--text-main); }

        /* OTP Inputs */
        .otp-container {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 40px;
        }

        .otp-input {
            width: 54px;
            height: 64px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            color: white;
            transition: all 0.3s;
            outline: none;
        }

        .otp-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            background: rgba(15, 23, 42, 0.8);
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .timer {
            font-size: 14px;
            color: var(--text-dim);
            margin-bottom: 16px;
        }

        .timer strong { color: var(--primary); }

        .resend-link {
            font-size: 14px;
            color: var(--text-dim);
        }

        .resend-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .resend-link a.disabled {
            color: var(--text-dim);
            cursor: not-allowed;
            text-decoration: none;
            opacity: 0.5;
        }

        .change-email {
            margin-top: 24px;
            font-size: 14px;
        }

        .change-email a { color: var(--text-dim); text-decoration: none; }
        .change-email a:hover { color: white; text-decoration: underline; }

        #error-msg {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 24px;
            display: none;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .spinner { width: 20px; height: 20px; border: 3px solid rgba(255, 255, 255, 0.3); border-radius: 50%; border-top-color: white; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 480px) {
            .verify-card { padding: 32px 20px; }
            .otp-input { width: 42px; height: 56px; font-size: 24px; }
            .otp-container { gap: 8px; }
        }
    </style>
</head>
<body>
    <div class="verify-card">
        <div class="icon-box">
            <i class="fas fa-shield-halved"></i>
        </div>

        <h1>Verify your email</h1>
        <p class="email-display">
            Check your inbox for a 6-digit code sent to <br>
            <strong id="display-email">demo@example.com</strong>
        </p>

        <div id="error-msg"></div>

        <div class="otp-container" id="otp-inputs">
            <input type="text" class="otp-input" maxlength="1" pattern="\d*" inputmode="numeric">
            <input type="text" class="otp-input" maxlength="1" pattern="\d*" inputmode="numeric">
            <input type="text" class="otp-input" maxlength="1" pattern="\d*" inputmode="numeric">
            <input type="text" class="otp-input" maxlength="1" pattern="\d*" inputmode="numeric">
            <input type="text" class="otp-input" maxlength="1" pattern="\d*" inputmode="numeric">
            <input type="text" class="otp-input" maxlength="1" pattern="\d*" inputmode="numeric">
        </div>

        <button class="btn-primary" id="verify-btn">
            <span id="btn-text">Verify Code</span>
            <div class="spinner" id="btn-spinner"></div>
        </button>

        <div class="timer" id="timer-box">
            Code expires in <strong id="countdown">05:00</strong>
        </div>

        <div class="resend-link">
            Didn't receive the code? <a id="resend-btn" class="disabled">Resend OTP</a>
        </div>

        <div class="change-email">
            <a href="/signup.html"><i class="fas fa-arrow-left"></i> Change email address</a>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        const email = localStorage.getItem('signup_email') || 'your email';
        document.getElementById('display-email').textContent = email;

        const inputs = document.querySelectorAll('.otp-input');
        const verifyBtn = document.getElementById('verify-btn');
        const errorMsg = document.getElementById('error-msg');
        const resendBtn = document.getElementById('resend-btn');
        const countdownEl = document.getElementById('countdown');

        // OTP Input Logic
        inputs.forEach((input, index) => {
            input.addEventListener('keyup', (e) => {
                if (e.key >= 0 && e.key <= 9) {
                    if (index < inputs.length - 1) inputs[index + 1].focus();
                } else if (e.key === 'Backspace') {
                    if (index > 0) inputs[index - 1].focus();
                }
                checkInputs();
            });

            input.addEventListener('paste', (e) => {
                const data = e.clipboardData.getData('text').slice(0, 6);
                if (/^\d+$/.test(data)) {
                    data.split('').forEach((char, i) => {
                        if (inputs[i]) inputs[i].value = char;
                    });
                    if (inputs[data.length]) inputs[data.length].focus();
                    else inputs[5].focus();
                    checkInputs();
                }
            });
        });

        function checkInputs() {
            const allFilled = Array.from(inputs).every(input => input.value !== '');
            verifyBtn.disabled = !allFilled;
        }

        // Timer Logic
        let timeLeft = 300;
        let timerId = setInterval(updateTimer, 1000);

        function updateTimer() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            countdownEl.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            if (timeLeft <= 0) {
                clearInterval(timerId);
                resendBtn.classList.remove('disabled');
            } else {
                timeLeft--;
            }
        }

        // Verify OTP
        verifyBtn.addEventListener('click', async () => {
            const otp = Array.from(inputs).map(input => input.value).join('');
            
            errorMsg.style.display = 'none';
            verifyBtn.disabled = true;
            document.getElementById('btn-text').style.display = 'none';
            document.getElementById('btn-spinner').style.display = 'block';

            try {
                const response = await fetch(`${API_BASE}/auth/verify-signup-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('signup_token', data.signup_token);
                    window.location.href = '/complete-signup.html';
                } else {
                    throw new Error(data.detail || 'Verification failed');
                }
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
                verifyBtn.disabled = false;
                document.getElementById('btn-text').style.display = 'block';
                document.getElementById('btn-spinner').style.display = 'none';
            }
        });

        // Resend OTP
        resendBtn.addEventListener('click', async () => {
            if (resendBtn.classList.contains('disabled')) return;

            resendBtn.classList.add('disabled');
            timeLeft = 30; // 30s cooldown for resend
            timerId = setInterval(updateTimer, 1000);

            try {
                await fetch(`${API_BASE}/auth/send-signup-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
            } catch (err) {
                console.error('Failed to resend OTP');
            }
        });
    </script>
</body>
</html>
