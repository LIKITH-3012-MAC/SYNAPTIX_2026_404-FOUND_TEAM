<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password — RESOLVIT</title>
    <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/LIKITH-3012-MAC/PORTFOLIO-LIKITH/main/resolvit.png">
  <link rel="shortcut icon" href="https://raw.githubusercontent.com/LIKITH-3012-MAC/PORTFOLIO-LIKITH/main/resolvit.png">
  <!-- Auth0 Runtime Configuration -->
  <script>
    window.AUTH0_CONFIG = {
      domain: "resolvit-ai.us.auth0.com",
      clientId: "wBl9vRriwj4qiDMAQeyPzDAxFF5O3tvI",
      redirectUri: "https://resolvit-app-2026.vercel.app"
    };
  </script>
</head>

<body>

    <div class="auth-page">
        <div class="auth-card glass glow-accent">
            <!-- Token Error State -->
            <div id="token-error" style="display: none; text-align: center;">
                <div style="font-size: 3rem; margin-bottom: 16px;">🔗</div>
                <h2 class="auth-title">Invalid Link</h2>
                <p class="auth-subtitle">This password reset link is invalid or has expired.</p>
                <a href="forgot-password.html" class="btn btn-primary" style="margin-top: 20px;">
                    Request New Link
                </a>
            </div>

            <!-- Reset Form -->
            <div id="reset-form-container">
                <div class="auth-logo">
                    <div class="nav-logo-icon">🔐</div>
                    <h1 style="font-size: 1.5rem; margin-top: 10px;">RESOLVIT</h1>
                </div>

                <h2 class="auth-title">Reset Password</h2>
                <p class="auth-subtitle">Create a new password for your account.</p>

                <div id="alert-container"></div>

                <form id="reset-form" class="flex flex-col gap-4">
                    <input type="hidden" id="token" />

                    <div class="form-group">
                        <label class="form-label">New Password</label>
                        <input type="password" id="new-password" class="form-input"
                            placeholder="Min 8 chars, 1 Upper, 1 Digit" required minlength="8"
                            autocomplete="new-password" />
                    </div>

                    <div class="form-group">
                        <label class="form-label">Confirm New Password</label>
                        <input type="password" id="confirm-password" class="form-input"
                            placeholder="Confirm your new password" required autocomplete="new-password" />
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg" id="submit-btn"
                        style="width:100%; margin-top: 12px;">
                        Reset Password
                    </button>
                </form>

                <div class="auth-footer" style="margin-top: 24px; text-align: center;">
                    <a href="index.html" style="color: var(--text-muted); font-size: 0.9rem;">← Back to Sign In</a>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>
    <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="https://cdn.auth0.com/js/auth0-spa-js/2.1/auth0-spa-js.production.min.js"></script>
  <script src="js/auth0-integration.js"></script>
    <script src="js/theme-manager.js"></script>
      
  
  
    <script src="js/animations.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById('token-error').style.display = 'block';
            document.getElementById('reset-form-container').style.display = 'none';
        } else {
            document.getElementById('token').value = token;
        }

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('new-password').value;
            const confirm = document.getElementById('confirm-password').value;
            const tokenValue = document.getElementById('token').value;
            const btn = document.getElementById('submit-btn');

            if (password !== confirm) {
                showToast('Passwords do not match', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = '⏳ Resetting...';

            try {
                const data = await API.post('/api/auth/reset-password', {
                    token: tokenValue,
                    new_password: password
                });
                document.getElementById('alert-container').innerHTML = `<div class="alert alert-success">✅ ${data.message}</div>`;
                showToast('Password reset successfully!');
                setTimeout(() => window.location.href = 'index.html', 2000);
            } catch (err) {
                document.getElementById('alert-container').innerHTML = `<div class="alert alert-error">❌ ${err.message}</div>`;
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        });
    </script>

    <!-- Smooth Scroll & Hardware Acceleration Engine -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <script src="js/smooth-scroll.js"></script>
</body>

</html>
