<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password — RESOLVIT</title>
    <link rel="stylesheet" href="css/styles.css" />
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1E3A8A 0%, #3B82F6 100%);
            padding: 20px;
        }
        .auth-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .auth-logo-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .auth-title {
            color: #1E3A8A;
            font-size: 24px;
            margin-bottom: 8px;
            text-align: center;
        }
        .auth-subtitle {
            color: #64748b;
            text-align: center;
            margin-bottom: 32px;
        }
        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        .form-input:focus {
            outline: none;
            border-color: #3B82F6;
        }
        .form-input.error {
            border-color: #ef4444;
        }
        .form-hint {
            font-size: 12px;
            color: #64748b;
            margin-top: 4px;
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #1E3A8A;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary:hover {
            background: #1e40af;
        }
        .btn-primary:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .alert-success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }
        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
        .password-requirements {
            background: #f8fafc;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
        }
        .password-requirements h4 {
            margin: 0 0 8px 0;
            color: #334155;
            font-size: 14px;
        }
        .password-requirements ul {
            margin: 0;
            padding-left: 20px;
            color: #64748b;
            font-size: 13px;
        }
        .password-requirements li {
            margin-bottom: 4px;
        }
        .password-requirements li.valid {
            color: #16a34a;
        }
        .back-link {
            text-align: center;
            margin-top: 24px;
            color: #64748b;
            font-size: 14px;
        }
        .back-link a {
            color: #1E3A8A;
            text-decoration: none;
            font-weight: 500;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
        .token-error {
            text-align: center;
        }
        .token-error-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
    </style>
</head>

<body>

    <div class="auth-container">
        <div class="auth-card">
            <!-- Token Error State -->
            <div id="token-error" style="display: none;" class="token-error">
                <div class="token-error-icon">🔗</div>
                <h2 class="auth-title">Invalid Link</h2>
                <p class="auth-subtitle">This password reset link is invalid or has expired.</p>
                <a href="forgot-password.html" class="btn-primary" style="display: inline-block; text-decoration: none; box-sizing: border-box;">
                    Request New Link
                </a>
            </div>

            <!-- Reset Form -->
            <div id="reset-form-container">
                <div class="auth-logo">
                    <div class="auth-logo-icon">🔐</div>
                </div>
                
                <h1 class="auth-title">Reset Password</h1>
                <p class="auth-subtitle">Create a new password for your account.</p>

                <div id="alert-container"></div>

                <form id="reset-form" onsubmit="handleSubmit(event)">
                    <input type="hidden" id="token" />
                    
                    <div class="form-group" style="margin-bottom: 16px;">
                        <label class="form-label">New Password</label>
                        <input 
                            type="password" 
                            id="new-password" 
                            class="form-input" 
                            placeholder="Enter new password" 
                            required 
                            minlength="8"
                            autocomplete="new-password"
                            oninput="validatePassword()"
                        />
                        <div class="form-hint">Minimum 8 characters</div>
                    </div>

                    <div class="form-group" style="margin-bottom: 24px;">
                        <label class="form-label">Confirm New Password</label>
                        <input 
                            type="password" 
                            id="confirm-password" 
                            class="form-input" 
                            placeholder="Confirm new password" 
                            required 
                            autocomplete="new-password"
                            oninput="validatePassword()"
                        />
                        <div class="form-hint" id="match-hint"></div>
                    </div>

                    <div class="password-requirements">
                        <h4>Password Requirements:</h4>
                        <ul>
                            <li id="req-length">At least 8 characters</li>
                            <li id="req-upper">At least one uppercase letter</li>
                            <li id="req-digit">At least one number</li>
                        </ul>
                    </div>

                    <button type="submit" class="btn-primary" id="submit-btn">
                        Reset Password
                    </button>
                </form>

                <div class="back-link">
                    <a href="index.html">← Back to Sign In</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? 'http://localhost:8000' 
            : '';

        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        // Check if token exists
        if (!token) {
            document.getElementById('token-error').style.display = 'block';
            document.getElementById('reset-form-container').style.display = 'none';
        } else {
            document.getElementById('token').value = token;
        }

        function validatePassword() {
            const password = document.getElementById('new-password').value;
            const confirm = document.getElementById('confirm-password').value;
            
            // Check requirements
            const hasLength = password.length >= 8;
            const hasUpper = /[A-Z]/.test(password);
            const hasDigit = /[0-9]/.test(password);
            
            document.getElementById('req-length').className = hasLength ? 'valid' : '';
            document.getElementById('req-upper').className = hasUpper ? 'valid' : '';
            document.getElementById('req-digit').className = hasDigit ? 'valid' : '';
            
            // Check match
            const matchHint = document.getElementById('match-hint');
            if (confirm) {
                if (password === confirm) {
                    matchHint.textContent = '✓ Passwords match';
                    matchHint.style.color = '#16a34a';
                } else {
                    matchHint.textContent = '✗ Passwords do not match';
                    matchHint.style.color = '#dc2626';
                }
            } else {
                matchHint.textContent = '';
            }
            
            return hasLength && hasUpper && hasDigit && password === confirm;
        }

        function showAlert(message, type = 'success') {
            const container = document.getElementById('alert-container');
            container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
        }

        async function handleSubmit(event) {
            event.preventDefault();
            
            const password = document.getElementById('new-password').value;
            const confirm = document.getElementById('confirm-password').value;
            const token = document.getElementById('token').value;
            const submitBtn = document.getElementById('submit-btn');
            
            // Validation
            if (password !== confirm) {
                showAlert('Passwords do not match.', 'error');
                return;
            }
            
            if (password.length < 8) {
                showAlert('Password must be at least 8 characters.', 'error');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Resetting...';
            
            try {
                const response = await fetch(`${API_BASE}/api/auth/reset-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        token: token,
                        new_password: password 
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showAlert('✅ Password reset successfully! Redirecting to login...', 'success');
                    document.getElementById('reset-form').reset();
                    setTimeout(() => {
                        window.location.href = 'index.html?password-reset=success';
                    }, 2000);
                } else {
                    showAlert('❌ ' + (data.detail || 'Failed to reset password'), 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Reset Password';
                }
            } catch (error) {
                showAlert('❌ Network error. Please try again.', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset Password';
            }
        }
    </script>
</body>

</html>
