<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Signup - RESOLVIT</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 30% 20%, rgba(99, 102, 241, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 70% 80%, rgba(139, 92, 246, 0.12) 0%, transparent 40%);
        }

        .complete-card {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .step-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .step { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: var(--text-dim); }
        .step.done { background: #22c55e; border-color: #22c55e; color: white; }
        .step.active { background: var(--primary); border-color: var(--primary); color: white; box-shadow: 0 0 15px rgba(99,102,241,0.4); }
        .step-line { flex: 1; height: 1px; background: var(--glass-border); max-width: 40px; }
        .step-line.done { background: #22c55e; }

        h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; text-align: center; }
        .subtitle { color: var(--text-dim); text-align: center; margin-bottom: 40px; font-size: 15px; }

        .form-group { margin-bottom: 24px; }
        label { display: block; color: var(--text-dim); font-size: 14px; margin-bottom: 8px; font-weight: 600; }
        
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 14px; }
        
        input {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 14px 14px 44px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }

        input:focus { border-color: var(--primary); background: rgba(15, 23, 42, 0.8); }

        .pass-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            cursor: pointer;
            font-size: 14px;
        }

        /* Password Strength */
        .strength-meter { height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; margin-top: 10px; overflow: hidden; display: flex; gap: 4px; }
        .strength-bar { flex: 1; height: 100%; background: #ef4444; transition: all 0.3s; opacity: 0.3; }
        .strength-bar.active { opacity: 1; }
        .strength-text { font-size: 12px; margin-top: 8px; color: var(--text-dim); display: block; text-align: right; }

        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 12px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(99,102,241,0.3); }

        #error-msg {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 24px;
            display: none;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .spinner { width: 20px; height: 20px; border: 3px solid rgba(255, 255, 255, 0.3); border-radius: 50%; border-top-color: white; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 480px) { .complete-card { padding: 32px 24px; } }
    </style>
</head>
<body>
    <div class="complete-card">
        <div class="step-indicator">
            <div class="step done"><i class="fas fa-check"></i></div>
            <div class="step-line done"></div>
            <div class="step done"><i class="fas fa-check"></i></div>
            <div class="step-line active"></div>
            <div class="step active">3</div>
        </div>

        <h1>Final Details</h1>
        <p class="subtitle">Complete your profile to access RESOLVIT intelligence.</p>

        <div id="error-msg"></div>

        <form id="complete-form">
            <div class="form-group">
                <label>Full Name</label>
                <div class="input-wrapper">
                    <input type="text" id="full-name" placeholder="E.g. John Doe" required>
                    <i class="fas fa-user"></i>
                </div>
            </div>

            <div class="form-group">
                <label>Pick a Username</label>
                <div class="input-wrapper">
                    <input type="text" id="username" placeholder="Unique username" required>
                    <i class="fas fa-at"></i>
                </div>
            </div>

            <div class="form-group">
                <label>Secure Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="Min. 8 characters" required>
                    <i class="fas fa-lock"></i>
                    <i class="fas fa-eye pass-toggle" id="toggle-pass"></i>
                </div>
                <div class="strength-meter">
                    <div class="strength-bar" id="bar-1"></div>
                    <div class="strength-bar" id="bar-2"></div>
                    <div class="strength-bar" id="bar-3"></div>
                    <div class="strength-bar" id="bar-4"></div>
                </div>
                <span class="strength-text" id="strength-label">Password strength: Weak</span>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <div class="input-wrapper">
                    <input type="password" id="confirm-password" placeholder="Repeat password" required>
                    <i class="fas fa-lock"></i>
                </div>
            </div>

            <button type="submit" class="btn-primary" id="final-btn">
                <span id="btn-text">Create My Account</span>
                <div class="spinner" id="btn-spinner"></div>
            </button>
        </form>
    </div>

    <script>
        const API_BASE = '/api';
        const signupToken = localStorage.getItem('signup_token');

        if (!signupToken) {
            window.location.href = '/signup.html';
        }

        // Toggle Password
        const togglePass = document.getElementById('toggle-pass');
        const passInput = document.getElementById('password');
        togglePass.addEventListener('click', () => {
            const isPass = passInput.type === 'password';
            passInput.type = isPass ? 'text' : 'password';
            togglePass.classList.toggle('fa-eye');
            togglePass.classList.toggle('fa-eye-slash');
        });

        // Strength Meter
        passInput.addEventListener('input', () => {
            const pass = passInput.value;
            let score = 0;
            if (pass.length >= 8) score++;
            if (/[A-Z]/.test(pass)) score++;
            if (/[0-9]/.test(pass)) score++;
            if (/[^A-Za-z0-9]/.test(pass)) score++;

            const labels = ['Weak', 'Fair', 'Good', 'Strong'];
            const colors = ['#ef4444', '#f59e0b', '#10b981', '#059669'];
            
            document.getElementById('strength-label').textContent = `Password strength: ${labels[score-1] || 'Weak'}`;
            
            for(let i=1; i<=4; i++) {
                const bar = document.getElementById(`bar-${i}`);
                bar.classList.toggle('active', i <= score);
                if (i <= score) bar.style.backgroundColor = colors[score-1];
            }
        });

        // Final Submit
        document.getElementById('complete-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullName = document.getElementById('full-name').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const errorMsg = document.getElementById('error-msg');
            const btn = document.getElementById('final-btn');

            if (password !== confirmPassword) {
                errorMsg.textContent = "Passwords do not match.";
                errorMsg.style.display = 'block';
                return;
            }

            errorMsg.style.display = 'none';
            btn.disabled = true;
            document.getElementById('btn-text').style.display = 'none';
            document.getElementById('btn-spinner').style.display = 'block';

            try {
                const response = await fetch(`${API_BASE}/auth/complete-signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        signup_token: signupToken,
                        full_name: fullName,
                        username: username,
                        password: password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Success! Cleanup and redirect
                    localStorage.removeItem('signup_token');
                    localStorage.removeItem('signup_email');
                    alert('Account created successfully! Redirecting to login...');
                    window.location.href = '/';
                } else {
                    throw new Error(data.detail || 'Signup failed');
                }
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
                btn.disabled = false;
                document.getElementById('btn-text').style.display = 'block';
                document.getElementById('btn-spinner').style.display = 'none';
            }
        });
    </script>
</body>
</html>
