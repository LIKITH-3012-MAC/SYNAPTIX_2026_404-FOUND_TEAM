version: "3.9"

services:
  # ── PostgreSQL Database ───────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: resolvit_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       resolvit
      POSTGRES_USER:     resolvit
      POSTGRES_PASSWORD: resolvit123
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resolvit -d resolvit"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resolvit_api
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://resolvit:resolvit123@db:5432/resolvit
      CORS_ORIGINS:  "http://localhost:3000,http://localhost:80,http://frontend"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Nginx Frontend ────────────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: resolvit_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  pg_data:
